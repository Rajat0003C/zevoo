<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkedWith - Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600;700&display=swap" rel="stylesheet">

<style>
:root{
  --paper:#F4F1EC;
  --primary:#2F4858;
  --primary-dark:#1C2E38;
  --accent:#B98655;
  --line:#E7E3DC;
  --ink:#22262A;
  --ink-soft:#6E7378;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#E9E5DD;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.phone-frame{
width:100%;
max-width:430px;
background:var(--paper);
padding:25px;
min-height:100vh;
}

.logo{
text-align:center;
margin-top:40px;
margin-bottom:30px;
}

.logo h1{
font-family:'Lora',serif;
color:var(--primary);
font-size:2rem;
}

.logo p{
color:var(--ink-soft);
}

.card{
background:#fff;
padding:25px;
border-radius:18px;
border:1px solid var(--line);
}

.label{
display:block;
margin-bottom:8px;
font-weight:600;
}

.input{
width:100%;
padding:14px;
border:1px solid var(--line);
border-radius:10px;
outline:none;
margin-bottom:15px;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:var(--primary);
color:white;
font-weight:700;
cursor:pointer;
}

.btn:hover{
background:var(--primary-dark);
}

.message{
margin-top:15px;
padding:12px;
border-radius:10px;
display:none;
font-size:14px;
}

.success{
background:#dff6dd;
color:#2d6a2d;
}

.error{
background:#ffe5e5;
color:#b00020;
}

.back{
margin-top:20px;
text-align:center;
}

.back a{
text-decoration:none;
color:var(--primary);
font-weight:700;
}
</style>
</head>
<body>

<div class="phone-frame">

<div class="logo">
<h1>WorkedWith</h1>
<p>Reset Your Password</p>
</div>

<div class="card">

<label class="label">
Email or Phone Number
</label>

<input
type="text"
id="userInput"
class="input"
placeholder="Enter Email or Phone Number">

<button
class="btn"
id="resetBtn">
Send Reset Link
</button>

<div id="message" class="message"></div>

<div class="back">
<a href="login.html">
Back to Login
</a>
</div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";

import {
getAuth,
sendPasswordResetEmail
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

import {
getFirestore,
collection,
query,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAQpIa5IIcK4NBn0p0zgE2Q-0Xdv6Hu4BQ",
  authDomain: "workedwith-91d94.firebaseapp.com",
  projectId: "workedwith-91d94",
  storageBucket: "workedwith-91d94.firebasestorage.app",
  messagingSenderId: "793805242005",
  appId: "1:793805242005:web:45a49b9547bfccad74a59c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const messageBox =
document.getElementById("message");

function showMessage(text,type){

messageBox.style.display="block";
messageBox.className="message " + type;
messageBox.textContent=text;

}

document
.getElementById("resetBtn")
.addEventListener("click", async ()=>{

try{

let value =
document.getElementById("userInput")
.value.trim();

if(!value){

showMessage(
"Please enter email or phone number",
"error"
);

return;
}

let email = value;

if(!value.includes("@")){

const q = query(
collection(db,"users"),
where("phone","==",value)
);

const snap =
await getDocs(q);

if(snap.empty){

showMessage(
"Phone number not found",
"error"
);

return;
}

email =
snap.docs[0].data().email;

}

await sendPasswordResetEmail(
auth,
email
);

showMessage(
"Password reset link sent to " + email,
"success"
);

}
catch(error){

showMessage(
error.message,
"error"
);

}

});

</script>

</body>
</html>
